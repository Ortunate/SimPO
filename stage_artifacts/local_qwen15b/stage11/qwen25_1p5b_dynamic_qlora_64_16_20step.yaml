# Stage L11 controlled data-scale dynamic-gamma smoke config.
# Do not use for full fine-tuning or benchmark claims.

# Model arguments
model_name_or_path: stage_artifacts/local_qwen15b/models/Qwen2.5-1.5B-Instruct
torch_dtype: bfloat16
attn_implementation: eager
trust_remote_code: false
use_peft: true
load_in_4bit: true
bnb_4bit_quant_type: nf4
use_bnb_nested_quant: true
bnb_4bit_quant_storage: uint8
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:
- q_proj
- k_proj
- v_proj
- o_proj
- gate_proj
- up_proj
- down_proj

# Data training arguments
dataset_mixer:
  stage_artifacts/local_qwen15b/data/trl_ultrafeedback_binarized_64_16: 1.0
dataset_splits:
- train
- test
preprocessing_num_workers: 1
auto_insert_empty_system_msg: false

# SimPOTrainer arguments
bf16: true
beta: 2.0
gamma_beta_ratio: 0.25
dynamic_gamma_enabled: true
dynamic_gamma_strategy: sim_linear
dynamic_gamma_similarity_scale: 0.5
dynamic_gamma_min: 0.0
dynamic_gamma_max: 0.25
do_eval: true
evaluation_strategy: steps
eval_steps: 5
gradient_accumulation_steps: 1
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
learning_rate: 5.0e-6
log_level: info
log_train_samples: false
logging_steps: 1
logging_strategy: steps
lr_scheduler_type: cosine
max_length: 512
max_prompt_length: 384
max_steps: 20
optim: paged_adamw_8bit
output_dir: stage_artifacts/local_qwen15b/outputs/stage11_dynamic_64_16_20step
overwrite_output_dir: true
run_name: local-qwen25-1p5b-stage11-dynamic-64-16-20step
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
push_to_hub: false
remove_unused_columns: false
save_strategy: "no"
report_to: []
seed: 42
warmup_ratio: 0.0
dataset_num_proc: 1
