# Model arguments
model_name_or_path: stage_artifacts/stage1/local_tiny_gpt2
torch_dtype: null
attn_implementation: eager

# Data training arguments
chat_template: "{% for message in messages %}\n{% if message['role'] == 'user' %}\n{{ '<|user|>\n' + message['content'] + eos_token }}\n{% elif message['role'] == 'system' %}\n{{ '<|system|>\n' + message['content'] + eos_token }}\n{% elif message['role'] == 'assistant' %}\n{{ '<|assistant|>\n'  + message['content'] + eos_token }}\n{% endif %}\n{% if loop.last and add_generation_prompt %}\n{{ '<|assistant|>' }}\n{% endif %}\n{% endfor %}"
dataset_mixer:
  stage_artifacts/stage1/local_pref_dataset: 1.0
dataset_splits:
- train
- test
preprocessing_num_workers: 1
auto_insert_empty_system_msg: false

# SimPOTrainer arguments
use_cpu: true
bf16: false
fp16: false
beta: 2.0
gamma_beta_ratio: 0.5
dynamic_gamma_enabled: true
dynamic_gamma_strategy: sim_linear
dynamic_gamma_similarity_scale: 0.5
dynamic_gamma_min: 0.0
dynamic_gamma_max: 0.5
do_eval: false
evaluation_strategy: "no"
gradient_accumulation_steps: 1
gradient_checkpointing: false
learning_rate: 1.0e-5
log_level: info
logging_steps: 1
logging_strategy: steps
lr_scheduler_type: linear
max_length: 64
max_prompt_length: 48
max_steps: 2
optim: adamw_torch
output_dir: stage_artifacts/stage2/local-run-simpo-dynamic-smoke-output
overwrite_output_dir: true
run_name: local-run-simpo-dynamic-smoke
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
push_to_hub: false
save_strategy: "no"
report_to: []
seed: 42
warmup_ratio: 0.0
dataset_num_proc: 1
